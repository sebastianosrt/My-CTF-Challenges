<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #111; color: #eee; max-width: 700px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #0f0; }
    h3 { margin-bottom: .5rem; }
    input, button { font-family: monospace; font-size: 1rem; padding: .5rem; background: #222; color: #eee; border: 1px solid #444; }
    input { width: 100%; margin-bottom: .5rem; }
    button { cursor: pointer; padding: .5rem 1rem; }
    button:hover { background: #333; }
    .btn-primary { border-color: #0a0; color: #0f0; }
    .section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #333; }
    .error { color: #f44; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>// SOP Calendar</h1>
  {{error}}
  <div class="section">
    <h3>Login</h3>
    <form method="POST" action="/login">
      <input name="username" placeholder="username" required />
      <input name="password" type="password" placeholder="password" required />
      <button type="submit">Login</button>
    </form>
  </div>
  <div class="section">
    <h3>Signup</h3>
    <form method="POST" action="/signup">
      <input name="username" placeholder="username" required />
      <input name="password" type="password" placeholder="password" required />
      <button type="submit" class="btn-primary">Signup</button>
    </form>
  </div>
</body>
</html>
