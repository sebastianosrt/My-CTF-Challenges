<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; max-width: 700px; margin: 0 auto; padding: 2rem; }
    h1 { color: #0f0; margin-bottom: 1rem; }
    h3 { margin-bottom: .5rem; }
    .meta { color: #bbb; margin-bottom: .5rem; }
    .content { padding: 1rem; border: 1px solid #333; white-space: pre-wrap; }
    .section { margin-top: 1rem; padding: 1rem; border: 1px solid #333; }
    .time-grid { display: grid; gap: .5rem; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: .5rem; }
    .time-grid label { font-size: .85rem; color: #bbb; display: flex; flex-direction: column; gap: .25rem; }
    input, textarea, button { font-family: monospace; font-size: 1rem; padding: .5rem; background: #222; color: #eee; border: 1px solid #444; }
    input, textarea { width: 100%; margin-bottom: .5rem; }
    textarea { min-height: 80px; resize: vertical; }
    button { cursor: pointer; padding: .5rem 1rem; }
    button:hover { background: #333; }
    .inline-form { display: inline; }
    .msg { color: #ff0; margin-bottom: 1rem; }
    a { color: #0ff; }
  </style>
</head>
<body>
  <h1>{{title}}</h1>
  <div class="meta">{{schedule}}</div>
  <div class="meta">Owner: {{owner}}</div>
  {{message}}
  <div class="content">{{notes}}</div>
  <br>
  {{report}}
  {{editor}}
  <br><a href="/calendar">Back</a> &middot; <a href="/settings">Settings</a>
</body>
</html>
