<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #111; color: #eee; max-width: 700px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #0f0; }
    h3 { margin-bottom: .5rem; }
    input, textarea, button { font-family: monospace; font-size: 1rem; padding: .5rem; background: #222; color: #eee; border: 1px solid #444; }
    input, textarea { width: 100%; margin-bottom: .5rem; }
    textarea { min-height: 80px; resize: vertical; }
    button { cursor: pointer; padding: .5rem 1rem; }
    button:hover { background: #333; }
    .btn-danger { border-color: #a00; color: #f44; }
    .btn-primary { border-color: #0a0; color: #0f0; }
    .section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #333; }
    .time-grid { display: grid; gap: .5rem; grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: .5rem; }
    .time-grid label { font-size: .85rem; color: #bbb; display: flex; flex-direction: column; gap: .25rem; }
    .event { padding: .75rem; margin-bottom: .5rem; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
    .event a { color: #0ff; }
    .event-meta { color: #bbb; font-size: .85rem; margin-top: .25rem; }
    .event-actions { display: flex; gap: .25rem; }
    .inline-form { display: inline; }
    .msg { color: #ff0; margin-bottom: 1rem; }
    .link-accent { color: #0ff; }
    .link-danger { color: #f44; }
    .timezone-summary { color: #bbb; margin-top: .25rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>// SOP Calendar</h1>
  <p>Logged in as <strong>{{username}}</strong> &middot; <a href="/settings" class="link-accent">settings</a> &middot; <a href="/logout" class="link-danger">logout</a></p>
  <p class="timezone-summary">Timezone: {{timezone}}</p>
  {{message}}
  <div class="section">
    <h3>New Event</h3>
    <form method="POST" action="/events">
      <input name="title" placeholder="title" required />
      <div class="time-grid">
        <label>
          Date
          <input type="date" name="day" required />
        </label>
        <label>
          Start
          <input type="time" name="start" required />
        </label>
        <label>
          End
          <input type="time" name="end" required />
        </label>
      </div>
      <textarea name="notes" placeholder="notes">{{notesTemplate}}</textarea>
      <button type="submit" class="btn-primary">Create</button>
    </form>
  </div>
  <div class="section">
    <h3>My Schedule</h3><br>
    {{events}}
  </div>
</body>
</html>
