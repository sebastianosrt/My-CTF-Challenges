<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #111; color: #eee; max-width: 700px; margin: 0 auto; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #0f0; }
    h3 { margin-bottom: .5rem; }
    input, textarea, button, select { font-family: monospace; font-size: 1rem; padding: .5rem; background: #222; color: #eee; border: 1px solid #444; }
    input, textarea, select { width: 100%; margin-bottom: .75rem; }
    textarea { min-height: 100px; resize: vertical; }
    button { cursor: pointer; padding: .5rem 1rem; }
    button:hover { background: #333; }
    .section { margin-bottom: 2rem; padding: 1rem; border: 1px solid #333; }
    .msg { color: #ff0; margin-bottom: 1rem; }
    .checkbox { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; color: #bbb; }
    .checkbox input { width: auto; margin: 0; }
    .field-label { display: block; margin-bottom: .25rem; color: #bbb; }
    a { color: #0ff; }
  </style>
</head>
<body>
  <h1>// Calendar Settings</h1>
  <p>Logged in as <strong>{{username}}</strong> &middot; <a href="/calendar">back to calendar</a></p><br>
  {{message}}
  <div class="section">
    <h3>Preferences</h3>
    <form method="POST" action="/settings">
      <label for="timezone" class="field-label">Timezone</label>
      <select id="timezone" name="timezone" required>
        {{timezoneOptions}}
      </select>
      <label class="checkbox">
        <input type="checkbox" name="showPastEvents" {{showPastChecked}} />
        Show past events in calendar
      </label>
      <label for="notesTemplate" class="field-label">Default notes template</label>
      <textarea id="notesTemplate" name="notesTemplate" placeholder="Template used for new events">{{notesTemplate}}</textarea>
      <button type="submit">Save settings</button>
    </form>
  </div>
</body>
</html>
